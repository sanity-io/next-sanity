packages:
  - apps/*
  - fixtures/*/*
  - packages/*

catalog:
  '@next/env': 16.3.0-canary.70
  '@sanity/client': ^7.23.0
  '@sanity/image-url': ^2.1.1
  '@sanity/tsconfig': ^2.1.0
  '@sanity/vision': 6.2.0
  '@types/node': ^24.13.2
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  groqd: ^1.7.1
  next: 16.3.0-canary.70
  react: ^19.2.7
  react-dom: ^19.2.7
  sanity: 6.2.0
  styled-components: ^6.4.3
  typescript: 5.9.3

dedupePeers: true
dedupeDirectDeps: true
linkWorkspacePackages: deep

overrides:
  '@next/env': 'catalog:'
  '@types/react': 'catalog:'
  '@types/react-dom': 'catalog:'
  next: 'catalog:'
  react: 'catalog:'
  react-dom: 'catalog:'
  # sanity: 'catalog:'
  sanity: next
  '@sanity/vision': next

peerDependencyRules:
  allowAny:
    - react
    - react-dom

preferWorkspacePackages: true
