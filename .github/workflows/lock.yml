---
name: Lock Threads

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@851cffe46851ddd2051ea7147ebdc995113241c3 # v6
        with:
          issue-inactive-days: 0
          pr-inactive-days: 7
